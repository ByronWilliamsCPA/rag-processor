# Docker Compose configuration for RAG Processor
# Development and production-ready setup with common services

version: '3.9'

services:
  # =============================================================================
  # Application Service
  # =============================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_ENV: ${ENVIRONMENT:-development}
    image: rag_processor:${VERSION:-latest}
    container_name: rag_processor-app
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      # Core settings
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      JSON_LOGS: ${JSON_LOGS:-false}

      # Database configuration
      DATABASE_URL: ${DATABASE_URL:-postgresql://rag_processor:password@db:5432/rag_processor}

      # Redis configuration (job queue)
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispassword}@redis:6379/0

      # Sentry (error tracking)
      # SENTRY_DSN: ${SENTRY_DSN:-}
      # SENTRY_ENVIRONMENT: ${ENVIRONMENT:-development}

      # Cloudflare Access (authentication)
      # CLOUDFLARE_TEAM_DOMAIN: ${CLOUDFLARE_TEAM_DOMAIN:-}
      # CLOUDFLARE_AUDIENCE_TAG: ${CLOUDFLARE_AUDIENCE_TAG:-}

    volumes:
      # Development: Mount source code for hot reload
      - ./src:/app/src:ro
      - ./tests:/app/tests:ro
      # File storage
      - upload-data:/data/uploads
      - result-data:/data/results

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    restart: unless-stopped

    # Security: Run as non-root user
    user: "1000:1000"

    networks:
      - rag_processor-network

# =============================================================================
  # Frontend Service (React + Vite)
  # =============================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    image: rag_processor-frontend:${VERSION:-latest}
    container_name: rag_processor-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - VITE_API_URL=http://localhost:${APP_PORT:-8000}
    volumes:
      # Development: Mount source code for hot reload
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
      - ./frontend/index.html:/app/index.html:ro
    depends_on:
      - app
    restart: unless-stopped

    networks:
      - rag_processor-network

# =============================================================================
  # Database Service (PostgreSQL)
  # =============================================================================
  db:
    image: postgres:16-alpine
    container_name: rag_processor-db
    environment:
      POSTGRES_DB: rag_processor
      POSTGRES_USER: rag_processor
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"

    volumes:
      # Persistent data
      - postgres-data:/var/lib/postgresql/data
      # Init scripts (optional)
      # - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro

    ports:
      - "${DB_PORT:-5432}:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_processor"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    restart: unless-stopped

    networks:
      - rag_processor-network

# =============================================================================
  # Redis Service (Job Queue + Caching)
  # =============================================================================
  redis:
    image: redis:7-alpine
    container_name: rag_processor-redis
    # AOF persistence with everysec fsync for durability without performance hit
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --requirepass ${REDIS_PASSWORD:-redispassword}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru

    volumes:
      - redis-data:/data

    ports:
      - "${REDIS_PORT:-6379}:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispassword}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

    restart: unless-stopped

    networks:
      - rag_processor-network

  # =============================================================================
  # RQ Worker Service (Background Job Processing)
  # =============================================================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_ENV: ${ENVIRONMENT:-development}
    image: rag_processor:${VERSION:-latest}
    container_name: rag_processor-worker
    # Process jobs from high, default, and low priority queues
    command: >
      python -m rq.cli worker
      high default low
      --url redis://:${REDIS_PASSWORD:-redispassword}@redis:6379/0
      --with-scheduler

    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispassword}@redis:6379/0

    volumes:
      # Shared file storage with gateway
      - upload-data:/data/uploads
      - result-data:/data/results
      # Development: Mount source code
      - ./src:/app/src:ro

    depends_on:
      redis:
        condition: service_healthy

    restart: unless-stopped
    user: "1000:1000"

    networks:
      - rag_processor-network

  # =============================================================================
  # Cloudflare Tunnel (Secure Ingress)
  # =============================================================================
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: rag_processor-cloudflared
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    restart: unless-stopped
    # Only start when explicitly enabled with: docker compose --profile production up -d
    profiles:
      - production

    networks:
      - rag_processor-network

# =============================================================================
# Volumes (Persistent Storage)
# =============================================================================
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  upload-data:
    driver: local
  result-data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  rag_processor-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

# =============================================================================
# Usage Instructions
# =============================================================================
# Development:
#   docker-compose up -d
#   docker-compose logs -f app
#   docker-compose exec app bash
#
# Production:
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Rebuild after dependency changes:
#   docker-compose up -d --build
#
# View logs:
#   docker-compose logs -f
#
# Stop services:
#   docker-compose down
#
# Clean up (including volumes):
#   docker-compose down -v
