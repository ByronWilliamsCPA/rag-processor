# Pre-commit hooks configuration
# See https://pre-commit.com for more information
#
# Hook stages:
# - pre-commit: Fast checks on every commit (formatting, syntax, security)
# - pre-push: Full quality checks before pushing (Qlty, full scans)
# - commit-msg: Conventional commit message validation
#
# Installation: curl https://qlty.sh | bash
# Documentation: https://docs.qlty.sh

ci:
  autoupdate_schedule: monthly
  autofix_prs: true
  skip: [validate-front-matter, qlty-check, qlty-full, trufflehog, darglint, bandit, bandit-full]  # Skip local-only hooks

repos:
  # ============================================================================
  # Fast File Checks (Lightweight, run on every commit)
  # ============================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "c4a0b883114b00d8d76b479c820ce7950211c99b"  # v4.5.0  # pragma: allowlist secret
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: check-yaml
        stages: [pre-commit]
        exclude: mkdocs.yml  # Exclude mkdocs.yml due to !ENV custom tags
      - id: check-json
        stages: [pre-commit]
      - id: check-toml
        stages: [pre-commit]
      - id: check-added-large-files
        args: ['--maxkb=10000']  # 10MB limit
        stages: [pre-commit]
      - id: check-merge-conflict
        stages: [pre-commit]
      - id: check-case-conflict
        stages: [pre-commit]
      - id: detect-private-key
        stages: [pre-commit]
      - id: mixed-line-ending
        args: ['--fix=lf']
        stages: [pre-commit]
      - id: debug-statements
        stages: [pre-commit]
      - id: check-executables-have-shebangs
        stages: [pre-commit]
      - id: check-shebang-scripts-are-executable
        stages: [pre-commit]

  # ============================================================================
  # Python Linting and Formatting - Ruff
  # ============================================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "0c7b6c989466a93942def1f84baf36ddfcd60c83"  # v0.15.14  # pragma: allowlist secret
    hooks:
      - id: ruff
        args: ['--fix']
        stages: [pre-commit]
      - id: ruff-format
        stages: [pre-commit]

  # ============================================================================
  # Type Checking - BasedPyright
  # ============================================================================
  - repo: local
    hooks:
      - id: basedpyright
        name: basedpyright
        entry: uv run basedpyright
        language: system
        types: [python]
        pass_filenames: false
        args: [src/]
        stages: [pre-commit]

  # ============================================================================
  # Secret Detection - TruffleHog
  # ============================================================================
  # Staged-files-only scan, fail-closed, with CHANGELOG.md and .submodules/ exclusions.
  # POSIX-compatible null-delimiter handling via tr instead of GNU-only grep -z.
  - repo: https://github.com/trufflesecurity/trufflehog
    rev: "37b77001d0174ebec2fcca2bd83ff83a6d45a3ab"  # v3.95.3  # pragma: allowlist secret
    hooks:
      - id: trufflehog
        entry: bash -c 'git diff --cached -z --name-only --diff-filter=d 2>/dev/null | tr "\0" "\n" | grep -v "^CHANGELOG\.md$" | grep -v "^\.submodules/" | grep -v "^uv\.lock$" | grep -v "^\.secrets\.baseline$" | grep -v "^$" | tr "\n" "\0" | xargs -0 -r trufflehog filesystem --fail --no-update'
        pass_filenames: false
        stages: [pre-commit]

  # ============================================================================
  # Secret Detection - detect-secrets (baseline regression)
  # ============================================================================
  - repo: https://github.com/Yelp/detect-secrets
    rev: "68e8b45440415753fff70a312ece8da92ba85b4a"  # v1.5.0  # pragma: allowlist secret
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        stages: [pre-commit]

  # ============================================================================
  # Security Scanning - Bandit
  # ============================================================================
  # Dedicated Bandit hook for Python security analysis
  # Runs on changed files during pre-commit, full scan on pre-push
  # Configuration in pyproject.toml [tool.bandit]
  - repo: https://github.com/PyCQA/bandit
    rev: "36fd65054fc8864b4037d0918904f9331512feb5"  # 1.7.10  # pragma: allowlist secret
    hooks:
      - id: bandit
        name: Bandit Security Scan (changed files)
        args: ['-c', 'pyproject.toml', '-ll']  # Medium+ severity only
        stages: [pre-commit]
        exclude: ^(tests|scripts|benchmarks|tools|fuzz)/

  # Full Bandit scan on pre-push (catches all issues before PR)
  - repo: local
    hooks:
      - id: bandit-full
        name: Bandit Security Scan (full src/)
        entry: uv run bandit -c pyproject.toml -r src/ -ll -q
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true

  # ============================================================================
  # Conventional Commits Enforcement
  # ============================================================================
  # Enforces conventional commit message format for semantic versioning
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: "8dc49e5ea0cab89785161620aa22a26f263661ca"  # v3.4.0  # pragma: allowlist secret
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert]

  # ============================================================================
  # Commitizen (commit-msg stage)
  # ============================================================================
  - repo: https://github.com/commitizen-tools/commitizen
    rev: "0fedbbe40de438359fdf74bb0ef645ed23063999"  # v4.16.2  # pragma: allowlist secret
    hooks:
      - id: commitizen
        stages: [commit-msg]

  # ============================================================================
  # pyproject.toml Validation
  # ============================================================================
  - repo: https://github.com/abravalheri/validate-pyproject
    rev: "435e09f5ed9fe57f3444ebfa54c663d0ac8033fe"  # v0.20.2  # pragma: allowlist secret
    hooks:
      - id: validate-pyproject
        stages: [pre-commit]

  # ============================================================================
  # GitHub Workflow Validation
  # ============================================================================
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: "37cd56d9d154dfb0648eaee8efc1040512700c47"  # 0.29.4  # pragma: allowlist secret
    hooks:
      - id: check-github-workflows
        stages: [pre-commit]

  # ============================================================================
  # YAML Linting
  # ============================================================================
  - repo: https://github.com/adrienverge/yamllint
    rev: "cba56bcde1fdd01c1deb3f945e69764c291a6530"  # v1.38.0  # pragma: allowlist secret
    hooks:
      - id: yamllint
        stages: [pre-commit]

  # ============================================================================
  # Markdown Linting
  # ============================================================================
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: "e72a3ca1632f0b11a07d171449fe447a7ff6795e"  # v0.48.0  # pragma: allowlist secret
    hooks:
      - id: markdownlint
        stages: [pre-commit]

  # ============================================================================
  # Qlty Unified Quality Checks (Pre-Push)
  # ============================================================================
  # Moved to pre-push to avoid clogging PR reviews with issues
  # Qlty runs all quality tools in a single pass:
  # - Ruff (linting + formatting)
  # - BasedPyright (type checking)
  # - Gitleaks (secrets detection)
  # - Markdownlint (markdown linting)
  # - Yamllint (YAML linting)
  # - OSV Scanner (dependency vulnerabilities)
  # - Code smells and complexity analysis
  #
  # Configure via .qlty/qlty.toml
  # Install: curl https://qlty.sh | bash && qlty plugins install
  - repo: local
    hooks:
      - id: qlty-check
        name: Qlty Code Quality Check (changed files)
        entry: >-
          bash -c "command -v qlty >/dev/null 2>&1 && qlty check --filter=diff || echo 'Qlty not installed - skipping (install: curl https://qlty.sh | bash)'"
        language: system
        types: [file]
        pass_filenames: false
        stages: [pre-push]
        verbose: true

      - id: qlty-full
        name: Qlty Full Quality Check (all files)
        entry: >-
          bash -c "command -v qlty >/dev/null 2>&1 && qlty check src/ || echo 'Qlty not installed - skipping'"
        language: system
        pass_filenames: false
        stages: [pre-push]
        verbose: true


  # ============================================================================
  # Custom Documentation Validation
  # ============================================================================
  - repo: local
    hooks:
      - id: validate-front-matter
        name: Validate documentation front matter
        entry: python tools/validate_front_matter.py docs
        language: python
        files: ^docs/.*\.md$
        pass_filenames: false
        stages: [pre-commit]
        additional_dependencies:
          - python-frontmatter>=1.1.0
          - pydantic>=2.0
          - ruamel.yaml>=0.18


  # ============================================================================
  # Python Docstring Coverage
  # ============================================================================
  # Interrogate ensures all Python code has proper docstrings
  # Two entries: one scoped to scripts/ (85%), one to src/ (80%)
  - repo: https://github.com/econchick/interrogate
    rev: "a6268877efd41a21197445cc04cbf28f9c6facba"  # 1.7.0  # pragma: allowlist secret
    hooks:
      - id: interrogate
        alias: interrogate-scripts
        args: ['-v', '-c', 'pyproject.toml', '--fail-under', '85', 'scripts/']
        language_version: python3.12
        pass_filenames: false
        stages: [pre-commit]
      - id: interrogate
        alias: interrogate-src
        args: ['-v', '-c', 'pyproject.toml', '--fail-under', '80', 'src/']
        language_version: python3.12
        pass_filenames: false
        stages: [pre-commit]

  # ============================================================================
  # Docstring Argument Validation
  # ============================================================================
  # Darglint validates that docstring arguments match function signatures
  # Configuration in pyproject.toml [tool.darglint]
  - repo: local
    hooks:
      - id: darglint
        name: Darglint docstring validation
        entry: uv run darglint
        language: system
        types: [python]
        stages: [pre-commit]
        exclude: ^(tests|scripts|benchmarks|tools)/

  # ============================================================================
  # Em-dash Guard
  # ============================================================================
  # Rejects any file containing an em-dash (U+2014).
  # Pre-existing em-dashes in the files listed below are excluded until they
  # are remediated; do not widen this list without removing the em-dashes first.
  - repo: local
    hooks:
      - id: no-em-dash
        name: no-em-dash
        # Fail when grep DOES find an em-dash; pass otherwise.
        # Bare `grep -P "..."` has inverted semantics for our use case.
        entry: bash -c 'if grep -lP "\xe2\x80\x94" "$@"; then echo "Em-dash (U+2014) found in files above; replace with comma, semicolon, colon, or restructure." >&2; exit 1; fi' --
        language: system
        exclude: >-
          (?x)^(
            SECURITY-FINDINGS\.md|
            docs/planning/PROJECT-PLAN\.md|
            docs/planning/project-vision\.md|
            src/rag_processor/auth/dependencies\.py|
            tests/unit/test_batch_authz\.py|
            tools/validate_front_matter\.py
          )$
        stages: [pre-commit]

# Exclude patterns
exclude: |
  (?x)^(
      \.git/|
      \.venv/|
      venv/|
      build/|
      dist/|
      .*\.egg-info/|
      __pycache__/|
      \.mypy_cache/|
      \.pytest_cache/|
      \.ruff_cache/|
      data/|
      models/|
      .*\.pyc
  )$
