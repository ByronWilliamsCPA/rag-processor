# Reusable Workflow Inventory (CI-024)
# Documents every org-level reusable workflow called from this repository,
# the SHA it is pinned to, the date it was last verified, and the GitHub
# Actions check context names it produces.
#
# Update this file whenever a reusable SHA is bumped.
# last_verified dates use ISO-8601 (YYYY-MM-DD).
#
# Org reusable repo: https://github.com/ByronWilliamsCPA/.github

