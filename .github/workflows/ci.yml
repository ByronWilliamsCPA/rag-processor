# CI/CD Pipeline
# Runs tests, linting, type checking, and security scans.
#
# Features:
#   - Standard quality checks (tests, linting, type checking)
#   - Security scanning (Bandit, Safety)
#   - Optional SonarCloud/Codecov integration
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master, develop]
  workflow_dispatch:

# Cancel in-progress runs for same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

# Uses org-level reusable workflow
jobs:
  ci:
    name: CI Pipeline
    uses: ByronWilliamsCPA/.github/.github/workflows/python-ci.yml@e067cdb7294f6221dbde74ef1f4c3ca735eed570 # main
    with:
      python-version: '3.12'
      coverage-threshold: 80
      source-directory: 'src'
      test-directory: 'tests'
      run-integration-tests: true
      run-security-tests: true
      fail-on-llm-tags: false
      enable-sonarcloud: false
      sonarcloud-organization: 'williaby'

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [ci]
    if: always()
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
      - name: Check CI results
        env:
          CI_RESULT: ${{ needs.ci.result }}
        run: |
          if [ "$CI_RESULT" != "success" ]; then
            echo "::error::CI Gate failed: CI result is $CI_RESULT"
            exit 1
          fi
          echo "CI Gate passed"
