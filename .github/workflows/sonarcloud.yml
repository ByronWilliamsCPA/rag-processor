# RAG Processor - SonarCloud Analysis
# Continuous code quality and security analysis using org-level reusable workflow.
#
# Features:
#   - Code quality metrics (bugs, code smells, technical debt)
#   - Security vulnerability detection (OWASP Top 10)
#   - Test coverage tracking
#   - Quality gate enforcement
#   - Pull request decoration
#
# SonarCloud Dashboard: https://sonarcloud.io/dashboard?id=ByronWilliamsCPA_rag_processor
# Documentation: https://docs.sonarsource.com/sonarqube-cloud/
name: SonarCloud

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - develop
  workflow_dispatch:

# Cancel in-progress runs for same PR/branch
concurrency:
  group: sonarcloud-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

# Uses org-level reusable workflow
jobs:
  sonarcloud:
    name: SonarCloud Analysis
    uses: ByronWilliamsCPA/.github/.github/workflows/python-sonarcloud.yml@main
    with:
      sonar-organization: 'williaby'
      sonar-project-key: 'ByronWilliamsCPA_rag_processor'
      python-version: '3.12'
      source-directory: 'src'
      coverage-paths: 'coverage.xml'
      extra-dependencies: 'dev'
      fail-on-quality-gate: false
      skip-if-no-token: true
      timeout-minutes: 15
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
