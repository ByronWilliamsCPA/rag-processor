# Dependency Review - Analyzes dependency changes in PRs
# Checks for vulnerabilities and license compliance
#
# Note: This workflow is intentionally separate from security-analysis.yml because:
#   1. It covers PRs to develop branch (security-analysis only covers main/master)
#   2. It provides explicit license deny/allow lists for compliance
#   3. Uses GitHub's native dependency-review-action for manifest-based analysis
#
# Features:
#   - Vulnerability detection in dependency changes
#   - License compliance checking (denies GPL/AGPL copyleft licenses)
#   - Blocks PRs with high severity vulnerabilities
#   - PR commenting on failures
name: Dependency Review

on:
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
          # Deny copyleft licenses that require source disclosure
          # Note: Cannot specify both allow-licenses and deny-licenses per action docs
          # Using deny-licenses only - all other licenses are allowed by default
          deny-licenses: GPL-3.0, AGPL-3.0, GPL-2.0
          # Comment on PR with findings
          comment-summary-in-pr: on-failure
