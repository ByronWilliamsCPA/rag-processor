# OpenSSF Scorecard for RAG Processor
# Security posture assessment and supply chain security validation.
#
# Dashboard: https://securityscorecards.dev/viewer/?uri=github.com/ByronWilliamsCPA/rag_processor
# Documentation: https://github.com/ossf/scorecard
name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    # Weekly on Tuesdays at 21:21 UTC
    - cron: '21 21 * * 2'
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  id-token: write
  actions: read

# Uses org-level reusable workflow
jobs:
  scorecard:
    name: Scorecard Analysis
    uses: ByronWilliamsCPA/.github/.github/workflows/python-scorecard.yml@62bfd795d1273b4819a3f66aa9cef0b917acb830 # main
    with:
      publish-results: true
      upload-sarif: true
      artifact-retention-days: 5
    secrets:
      SCORECARD_TOKEN: ${{ secrets.SCORECARD_TOKEN }}
