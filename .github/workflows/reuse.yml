# REUSE Compliance Check for RAG Processor
# Validates REUSE 3.0 specification compliance for license management using org-level reusable workflow.
#
# REUSE helps with clear licensing by using SPDX headers.
# Documentation: https://reuse.software/
name: REUSE Compliance

on:
  pull_request:
    paths:
      - "**/*"
      - "REUSE.toml"
      - "LICENSES/**"
      - ".github/workflows/reuse.yml"
  push:
    branches:
      - main
      - master
      - develop

# Cancel in-progress runs for same PR/branch
concurrency:
  group: reuse-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Uses org-level reusable workflow
jobs:
  reuse:
    name: REUSE Compliance
    uses: ByronWilliamsCPA/.github/.github/workflows/python-reuse.yml@main
    with:
      generate-spdx: true
      fail-on-missing: true
      artifact-retention-days: 90

  # Project-specific: Validate license files exist
  validate-licenses:
    name: Validate License Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check primary license exists
        run: |
          if [ ! -f "LICENSES/MIT.txt" ]; then
            echo "Warning: MIT.txt not found in LICENSES/"
            echo "You may need to download it from https://spdx.org/licenses/"
          fi

      - name: Verify REUSE.toml exists
        run: |
          if [ ! -f "REUSE.toml" ]; then
            echo "Error: REUSE.toml missing from repository root"
            exit 1
          fi
