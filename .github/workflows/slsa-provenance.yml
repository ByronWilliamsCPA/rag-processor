# SLSA Provenance Generation for RAG Processor
# Generates SLSA Level 3 provenance attestations for published packages.
#
# This workflow builds the package, generates hashes, and calls the org-level
# SLSA provenance workflow to create cryptographic attestations.
#
# Reference: https://slsa.dev/
name: SLSA Provenance

on:
  # Trigger after successful release
  workflow_run:
    workflows: ["Semantic Release"]
    types: [completed]
    branches: [main, master]
  # Manual trigger for re-generating provenance
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to generate provenance for (e.g., 0.1.0)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  actions: read
  attestations: write

jobs:
  # ==========================================================================
  # Build and Generate Hashes
  # ==========================================================================
  build:
    name: Build Package
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      hashes: ${{ steps.hashes.outputs.hashes }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(grep -Po '(?<=^version = ")[^"]*' pyproject.toml)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build package
        run: uv build

      - name: Generate SHA256 hashes
        id: hashes
        run: |
          cd dist
          HASHES=$(sha256sum * | base64 -w0)
          echo "hashes=$HASHES" >> $GITHUB_OUTPUT

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-${{ steps.version.outputs.version }}
          path: dist/
          retention-days: 90

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'dist/*'

  # ==========================================================================
  # SLSA Level 3 Provenance (Org-Level Reusable Workflow)
  # ==========================================================================
  slsa:
    name: SLSA Level 3
    needs: [build]
    uses: ByronWilliamsCPA/.github/.github/workflows/python-slsa.yml@main
    with:
      base64-subjects: ${{ needs.build.outputs.hashes }}
      upload-assets: true
    permissions:
      id-token: write
      contents: write
      actions: read
