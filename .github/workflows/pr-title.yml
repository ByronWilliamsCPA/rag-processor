# PR Title Validation (CI-037)
# Enforces conventional commit prefixes on pull request titles so that
# semantic-release can parse them correctly.
#
# Valid prefixes: feat, fix, docs, chore, refactor, test, perf, build, ci,
#                 style, revert  (with optional scope and optional ! for breaking)
# Examples:
#   feat(auth): add OAuth2 login
#   fix!: remove deprecated endpoint
#   docs: update README
name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches:
      - main
      - master
      - develop

permissions:
  pull-requests: read

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  validate-pr-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7618a84e  # v2.10.4
        with:
          egress-policy: audit
          # TODO(CI-031): switch to egress-policy: block after baselining 2026-08-01

      - name: Validate PR title follows conventional commits
        uses: amannn/action-semantic-pull-request@0723387faaf9b38adef4775cd42cfd5155ed6017  # v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed types per conventional commits spec
          types: |
            feat
            fix
            docs
            chore
            refactor
            test
            perf
            build
            ci
            style
            revert
          # Allow breaking-change marker (!) after type/scope
          requireScope: false
          # Disallow uppercase first letter to keep titles consistent
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" must start with a lowercase letter.
            Example: "feat: add login page" not "feat: Add login page"
