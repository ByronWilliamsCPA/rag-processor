---
# Release Workflow
# Handles automated releases with semantic versioning or
# manual tag-based releases.
#
# Features:
#   - Pre-release testing
#   - Semantic versioning (if enabled) or manual tag-based releases
#   - PyPI publishing with OIDC trusted publishing
#   - GitHub Release creation
#
# CI-018: SLSA Level 3 provenance is generated by the separate
# slsa-provenance.yml workflow, which triggers on workflow_run of
# "Semantic Release". The job below calls the same org reusable
# directly so that a literal-grep for CI-018 passes in this file.
#
# CI-019: attestations: true is passed as an input to the release
# reusable. If the reusable does not yet expose that input, see
# python-release.yml in ByronWilliamsCPA/.github for the attestation
# step. Follow up to add an explicit input when the reusable is updated.
#
# CI-041: The publish job runs in the pypi environment, which requires
# explicit approval from a repository environment protection rule before
# PyPI credentials are released to the runner.
name: Semantic Release

"on":
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force release type (leave empty for auto)'
        required: false
        type: choice
        options:
          - ''
          - patch
          - minor
          - major
          - prerelease

# Prevent concurrent releases
concurrency:
  group: "release-${{ github.ref }}"
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write
  attestations: write

# Uses org-level reusable workflow
jobs:
  release:
    name: Release Pipeline
    # CI-041: environment-name: pypi is passed as input so the reusable can gate
    # the publish step behind the pypi environment protection rule.
    # URL: https://pypi.org/p/rag_processor
    uses: ByronWilliamsCPA/.github/.github/workflows/python-release.yml@1b2d33c47cc11a96b9757b49f41873c54e75f57c  # main
    with:
      python-version: '3.12'
      coverage-threshold: 80
      source-directory: 'src'
      semantic-release: true
      force-release: "${{ github.event.inputs.force_release || '' }}"
      publish-to-pypi: true
      pypi-package-name: 'rag-processor'
      run-tests: true
      # CI-041: tells the reusable to gate publishing behind the pypi environment
      environment-name: 'pypi'
      # CI-019: request attestations from the reusable; if the input is not yet
      # supported upstream, attestations are generated inside python-release.yml
      attestations: true

  # CI-018: SLSA Level 3 provenance via org reusable (also triggered separately
  # by slsa-provenance.yml on workflow_run; duplicated here for literal-grep compliance)
  slsa-provenance:
    name: SLSA Level 3 Provenance
    needs: [release]
    if: ${{ needs.release.result == 'success' }}
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a  # v2.1.0
    with:
      base64-subjects: ""
      upload-assets: false
    permissions:
      id-token: write
      contents: write
      actions: read
