---
# Release Workflow
# Handles automated releases with semantic versioning or
# manual tag-based releases.
#
# Features:
#   - Pre-release testing
#   - Semantic versioning (if enabled) or manual tag-based releases
#   - PyPI publishing with OIDC trusted publishing
#   - GitHub Release creation
#
# CI-018: SLSA Level 3 provenance is generated by the separate
# slsa-provenance.yml workflow, which triggers on workflow_run of
# "Semantic Release" and feeds real build artifact hashes into the
# slsa-github-generator generator_generic_slsa3.yml reusable. This file
# intentionally does NOT call that generator directly because doing so
# with empty base64-subjects would fail every release.
#
# CI-019: Attestation generation is performed inside the upstream
# python-release.yml reusable's release step; there is no caller-side
# input for it at the current pinned SHA (1b2d33c4). The
# `attestations: write` permission below grants the reusable the token
# scope it needs to produce them.
#
# CI-041: PyPI publishing is gated by OIDC trusted publishing configured
# on PyPI plus environment protection rules attached to the `pypi`
# environment in the upstream reusable. The `environment-name` input is
# not exposed at the pinned SHA, so gating is enforced by the reusable's
# internal `environment:` declaration rather than a caller-side input.
name: Semantic Release

"on":
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force release type (leave empty for auto)'
        required: false
        type: choice
        options:
          - ''
          - patch
          - minor
          - major
          - prerelease

# Prevent concurrent releases
concurrency:
  group: "release-${{ github.ref }}"
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write
  attestations: write

# Uses org-level reusable workflow
jobs:
  release:
    name: Release Pipeline
    # URL: https://pypi.org/p/rag_processor
    uses: ByronWilliamsCPA/.github/.github/workflows/python-release.yml@1b2d33c47cc11a96b9757b49f41873c54e75f57c  # main
    with:
      python-version: '3.12'
      coverage-threshold: 80
      source-directory: 'src'
      semantic-release: true
      force-release: "${{ github.event.inputs.force_release || '' }}"
      publish-to-pypi: true
      pypi-package-name: 'rag-processor'
      run-tests: true
      # rag-processor uses hatchling as build backend; editable installs
      # require building, so override the reusable's no-build: true default.
      no-build: false
