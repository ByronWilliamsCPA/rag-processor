---
# Release Workflow
# Handles automated releases with semantic versioning or
# manual tag-based releases.
#
# Features:
#   - Pre-release testing
#   - Semantic versioning (if enabled) or manual tag-based releases
#   - PyPI publishing with OIDC trusted publishing
#   - GitHub Release creation
name: Semantic Release

"on":
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force release type (leave empty for auto)'
        required: false
        type: choice
        options:
          - ''
          - patch
          - minor
          - major
          - prerelease

# Prevent concurrent releases
concurrency:
  group: "release-${{ github.event.workflow_run.head_branch || github.ref_name }}"
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write      # required by the reusable's release job for artifact attestation
  attestations: write  # required by the reusable's release job for artifact attestation

# Uses org-level reusable workflow
jobs:
  release:
    name: Release Pipeline
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    uses: ByronWilliamsCPA/.github/.github/workflows/python-release.yml@a9781c9f0f051339d5fed81b6b9f4fff2b064035 # main
    with:
      python-version: '3.12'
      coverage-threshold: 80
      source-directory: 'src'
      semantic-release: true
      force-release: "${{ github.event.inputs.force_release || '' }}"
      publish-to-pypi: false  # re-enable when PyPI project is registered
      pypi-package-name: 'rag-processor'
      run-tests: false
      skip-tests-reason: 'Tests run in upstream CI pipeline before this workflow fires'
      no-build: false
