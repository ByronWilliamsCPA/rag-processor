# SBOM & Security Scan - Calls Org-Level Reusable Workflow
# This is a lightweight caller workflow that invokes the organization's
# shared SBOM generation and security scanning workflow.
#
# Features:
#   - CycloneDX SBOM generation
#   - Trivy vulnerability scanning
#   - License compliance checking
#   - SARIF upload to GitHub Security tab
name: SBOM & Security Scan

on:
  pull_request:
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/sbom.yml"
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - "pyproject.toml"
      - "uv.lock"
  schedule:
    # Weekly scan every Monday at 8:00 AM UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:

# Note: The org workflow uses permissions: read-all and needs security-events:write
# We must grant all permissions the org workflow expects
permissions:
  contents: read
  actions: read
  packages: read
  security-events: write
  # Additional read permissions required by org workflow's read-all
  checks: read
  deployments: read
  discussions: read
  issues: read
  pages: read
  pull-requests: read
  repository-projects: read
  statuses: read
  id-token: write  # Required for OIDC token generation

env:
  INFISICAL_DOMAIN: https://infisical.williamshome.family
jobs:
  sbom:
    name: SBOM & Security
    uses: ByronWilliamsCPA/.github/.github/workflows/python-sbom.yml@main
    with:
      python-version: '3.12'
      fail-on-vulnerabilities: true
      severity-threshold: 'CRITICAL,HIGH'
      artifact-retention-days: 90
      fail-on-forbidden-licenses: false
    secrets:
      INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
      INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
