# Documentation Workflow
# Builds and deploys MkDocs documentation to GitHub Pages.
#
# Features:
#   - MkDocs Material theme build
#   - GitHub Pages deployment on push to main
#   - PR preview builds
name: Documentation

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
  workflow_dispatch:

permissions:
  contents: write  # For GitHub Pages deployment
  pages: write
  id-token: write

# Uses org-level reusable workflow
jobs:
  docs:
    name: Build & Deploy Docs
    uses: ByronWilliamsCPA/.github/.github/workflows/python-docs.yml@d88dd0389442f94cc27472f4669af6cad97fc1cd # main
    with:
      python-version: '3.12'
      # rag-processor uses hatchling as build backend, so editable installs
      # require the build step. The reusable defaults no-build: true; override.
      # Matches the pattern PR #33 applied to ci.yml and security-analysis.yml.
      no-build: false
      deploy-to-pages: >-
        ${{
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main'
        }}
