# PR Validation for RAG Processor
# Comprehensive pull request validation using org-level workflow plus additional checks.
#
# This workflow calls the org-level PR validation workflow and adds supplementary
# checks for dead code detection and documentation links.
name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - master
      - develop

# Cancel in-progress runs for same PR
concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ==========================================================================
  # Org-Level PR Validation (Core Checks)
  # ==========================================================================
  core-validation:
    name: Core Validation
    permissions:
      contents: read
      pull-requests: write
      checks: write
    uses: ByronWilliamsCPA/.github/.github/workflows/python-ci.yml@961eb17d8e9b7fe0d8bfc5dbe9d23c824484fb11 # main
    with:
      python-version: '3.12'
      coverage-threshold: 80
      enable-dead-code-check: true
      no-build: false
  # ==========================================================================
  # Additional Checks (Template-Specific)
  # ==========================================================================

  # Dead Code Detection with Vulture
  dead-code:
    name: Dead Code Check
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-local-path: ".uv-cache"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run vulture
        run: |
          echo "## Dead Code Report" >> $GITHUB_STEP_SUMMARY
          uv run vulture src/ --min-confidence 90 | tee vulture-report.txt || true
          if [ -s vulture-report.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat vulture-report.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "::warning::Potential dead code detected. Review vulture report."
          else
            echo "✅ No dead code detected with 90% confidence." >> $GITHUB_STEP_SUMMARY
          fi

  # Documentation Link Check
  link-check:
    name: Documentation Links
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check documentation links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,204,206,301,302,403,429
            --exclude-mail
            --exclude '^https://github.com/.*/(issues|pulls|compare)/.*$'
            --exclude '^https://linear.app/.*$'
            './docs/**/*.md'
            './README.md'
            './CONTRIBUTING.md'
          fail: false
          jobSummary: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # Dependency and Standards Validation
  dependency-standards-validation:
    name: Dependency & Standards Validation
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-local-path: ".uv-cache"

      - name: Verify lock file is current
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Export locked requirements for audit
        run: uv export --frozen --no-hashes --output-file /tmp/requirements-locked.txt

      - name: Run pip-audit against locked requirements
        run: |
          # Build --ignore-vuln args from [tool.pip-audit].ignore-vuln as a
          # bash array (one flag per element, no word-splitting risk on the
          # final command line). If pyproject.toml is unreadable, emit a
          # ::warning:: annotation instead of silently swallowing the error,
          # then run pip-audit without ignores so any regression surfaces.
          IGNORE_ARGS=()
          if ! ignore_output=$(python3 - <<'PY'
          import tomllib
          d = tomllib.load(open("pyproject.toml", "rb"))
          for vid in d.get("tool", {}).get("pip-audit", {}).get("ignore-vuln", []):
              print("--ignore-vuln")
              print(vid)
          PY
          ); then
            echo "::warning::Failed to read [tool.pip-audit].ignore-vuln from pyproject.toml; running pip-audit without ignores." >&2
          elif [ -n "$ignore_output" ]; then
            mapfile -t IGNORE_ARGS <<<"$ignore_output"
          fi
          uv run pip-audit --requirement /tmp/requirements-locked.txt "${IGNORE_ARGS[@]}"

      - name: Dependency Validation Summary
        if: always()
        run: |
          echo "## Dependency & Standards Validation" >> $GITHUB_STEP_SUMMARY
          echo "- Lock file consistency: verified" >> $GITHUB_STEP_SUMMARY
          echo "- Vulnerability scan: complete" >> $GITHUB_STEP_SUMMARY

  # ==========================================================================
  # Validation Summary
  # ==========================================================================
  validation-summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [core-validation, dead-code, link-check, dependency-standards-validation]
    if: always()
    steps:
      - name: Check validation results
        env:
          CORE_RESULT: ${{ needs.core-validation.result }}
          DEP_RESULT: ${{ needs.dependency-standards-validation.result }}
          DEAD_CODE_RESULT: ${{ needs.dead-code.result }}
          LINK_RESULT: ${{ needs.link-check.result }}
        run: |
          echo "## PR Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$CORE_RESULT" == "success" ]; then
            echo "✅ Core Validation: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Core Validation: $CORE_RESULT" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$DEP_RESULT" == "success" ]; then
            echo "✅ Dependency & Standards Validation: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Dependency & Standards Validation: $DEP_RESULT" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$DEAD_CODE_RESULT" == "success" ]; then
            echo "✅ Dead Code Check: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Dead Code Check: $DEAD_CODE_RESULT" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$LINK_RESULT" == "success" ]; then
            echo "✅ Link Check: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Link Check: $LINK_RESULT" >> $GITHUB_STEP_SUMMARY
          fi
          # Fail if required checks failed
          if [ "$CORE_RESULT" == "failure" ] || [ "$DEP_RESULT" == "failure" ]; then
            echo ""
            echo "❌ Required validation checks failed. Please review and fix issues." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo ""
          echo "✅ All validation checks passed!" >> $GITHUB_STEP_SUMMARY
