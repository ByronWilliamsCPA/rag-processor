name: Qlty

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions: read-all

concurrency:
  group: qlty-coverage-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  qlty:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    uses: ByronWilliamsCPA/.github/.github/workflows/python-qlty-coverage.yml@6f71aecae2c91214ca0a0a2206a36cf912aa31ac # main
    permissions:
      contents: read
      actions: read
    with:
      coverage-artifact-name: coverage-reports
      coverage-file-path: coverage.xml
      coverage-format: cobertura
      workflow-run-id: ${{ github.event.workflow_run.id }}
    secrets:
      QLTY_COVERAGE_TOKEN: ${{ secrets.QLTY_COVERAGE_TOKEN }}
