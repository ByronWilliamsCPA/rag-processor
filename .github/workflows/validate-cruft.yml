# Validate Cruft Status for RAG Processor
# Ensures project stays in sync with cookiecutter template using org-level reusable workflow.
#
# Features:
#   - Template synchronization validation
#   - Detection of manual .cruft.json edits
#   - Orphaned conditional file detection (project-specific)
#
# Documentation: https://cruft.github.io/cruft/
name: Validate Cruft Status

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    # Run weekly on Monday at 9am UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

# Cancel in-progress runs for same PR/branch
concurrency:
  group: cruft-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

# Uses org-level reusable workflow for core cruft checks
jobs:
  cruft-validation:
    name: Cruft Validation
    uses: ByronWilliamsCPA/.github/.github/workflows/python-supplemental-checks.yml@main
    with:
      # Cruft checking
      enable-cruft-check: true
      cruft-fail-on-diff: ${{ github.event_name != 'schedule' && github.event_name != 'workflow_dispatch' }}
      python-version: '3.12'
      # Disable other supplemental checks (handled by other workflows)
      enable-link-check: false
      enable-changelog-check: false
      enable-automerge: false

  # Project-specific: Check for orphaned conditional files
  orphaned-files:
    name: Check Orphaned Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.12'

      - name: Check for orphaned conditional files
        id: orphan-check
        run: |
          echo "Checking for orphaned conditional files..."
          echo ""
          echo "Note: Cruft update only syncs file contents - it does NOT re-run"
          echo "post-generation hooks that clean up conditional files."
          echo ""
          python scripts/check_orphaned_files.py
        continue-on-error: false

      - name: Orphaned files fix instructions
        if: failure()
        run: |
          echo ""
          echo "=========================================="
          echo "HOW TO FIX ORPHANED FILES"
          echo "=========================================="
          echo ""
          echo "Option 1 - Automated cleanup:"
          echo "  python scripts/cleanup_conditional_files.py"
          echo ""
          echo "Option 2 - Manual cleanup:"
          echo "  Delete the orphaned files/directories listed above"
          echo ""
          echo "After cleanup, commit the changes:"
          echo "  git add -A"
          echo "  git commit -m 'chore: remove orphaned conditional files'"
          echo ""

  # Summary job
  validation-summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [cruft-validation, orphaned-files]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## Cruft Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.cruft-validation.result }}" == "success" ]; then
            echo "✅ Cruft Validation: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Cruft Validation: ${{ needs.cruft-validation.result }}" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.orphaned-files.result }}" == "success" ]; then
            echo "✅ Orphaned Files Check: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Orphaned Files Check: ${{ needs.orphaned-files.result }}" >> $GITHUB_STEP_SUMMARY
          fi

          # Fail if either check failed
          if [ "${{ needs.cruft-validation.result }}" == "failure" ] || [ "${{ needs.orphaned-files.result }}" == "failure" ]; then
            exit 1
          fi
