# Container Security Scanning for RAG Processor
# Scans Docker images for vulnerabilities using Trivy and lints Dockerfile with Hadolint.
#
# This is a thin caller to the org-level reusable workflow.
name: Container Security

on:
  push:
    branches: [main, master]
    paths:
      - 'Dockerfile'
      - 'docker-compose*.yml'
      - '.dockerignore'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.trivyignore'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'Dockerfile'
      - 'docker-compose*.yml'
      - '.dockerignore'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.trivyignore'
  schedule:
    # Weekly scan on Wednesdays at 7 AM UTC
    - cron: '0 7 * * 3'
  workflow_dispatch:

# Cancel in-progress runs for same PR/branch
concurrency:
  group: container-security-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  packages: read

jobs:
  container-security:
    name: Container Security Scan
    uses: ByronWilliamsCPA/.github/.github/workflows/python-container-security.yml@d88dd0389442f94cc27472f4669af6cad97fc1cd # main
    with:
      dockerfile-path: 'Dockerfile'
      build-context: '.'
      image-tag: 'rag_processor:scan'
      build-image: true
      severity-threshold: 'CRITICAL,HIGH'
      fail-on-vulnerabilities: true
      run-hadolint: true
      hadolint-failure-threshold: 'warning'
      generate-sbom: true
      upload-sarif: true
      artifact-retention-days: 90
    secrets:
      DHI_USERNAME: ${{ secrets.DHI_USERNAME }}
      DHI_PAT: ${{ secrets.DHI_PAT }}
