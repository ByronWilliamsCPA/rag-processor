# Performance Regression Testing for RAG Processor
# Automated performance benchmarking using org-level reusable workflow.
#
# Features:
#   - Benchmark execution on PR and main branch
#   - Regression detection with configurable thresholds
#   - PR commenting with detailed metrics
#   - Baseline comparison (committed or generated)
#
# To use this workflow:
#   1. Create scripts/benchmark.py that outputs JSON metrics
#   2. Optionally commit a baseline file at benchmarks/baseline.json
#
# Documentation: See org workflow for full configuration options
name: Performance Regression

on:
  # Run on PRs that modify performance-critical code
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'src/**/*.py'
      - 'scripts/benchmark.py'
      - 'benchmarks/**'
      - '.github/workflows/performance-regression.yml'
  # Weekly scheduled run to update baselines
  schedule:
    # Run weekly on Saturdays at 3 AM UTC
    - cron: '0 3 * * 6'
  workflow_dispatch:
    inputs:
      regression_threshold:
        description: 'Maximum allowed regression percentage'
        required: false
        default: '10'
        type: string

# Cancel in-progress runs for same PR/branch
concurrency:
  group: perf-regression-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # Check if benchmark script exists before running
  check-benchmarks:
    name: Check Benchmark Setup
    runs-on: ubuntu-latest
    outputs:
      has-benchmarks: ${{ steps.check.outputs.has-benchmarks }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check for benchmark script
        id: check
        run: |
          if [ -f "scripts/benchmark.py" ]; then
            echo "has-benchmarks=true" >> $GITHUB_OUTPUT
            echo "✅ Benchmark script found at scripts/benchmark.py"
          else
            echo "has-benchmarks=false" >> $GITHUB_OUTPUT
            echo "⚠️ No benchmark script found. Skipping performance regression testing."
            echo ""
            echo "To enable performance testing:"
            echo "  1. Create scripts/benchmark.py"
            echo "  2. Script should output JSON with metrics like:"
            echo '     {"p95_ms": 45.2, "p99_ms": 78.5, "throughput_rps": 1200}'
          fi

  # Run performance regression tests using org workflow
  performance:
    name: Performance Regression
    needs: check-benchmarks
    if: needs.check-benchmarks.outputs.has-benchmarks == 'true'
    uses: ByronWilliamsCPA/.github/.github/workflows/python-performance-regression.yml@main
    with:
      benchmark-script: 'scripts/benchmark.py'
      python-version: '3.12'
      primary-metric: 'p95_ms'
      regression-threshold: ${{ github.event.inputs.regression_threshold && fromJSON(github.event.inputs.regression_threshold) || 10.0 }}
      improvement-threshold: 5.0
      warmup-iterations: 5
      benchmark-iterations: 50
      fail-on-regression: ${{ github.event_name == 'pull_request' }}
      comment-on-pr: true
      extra-dependencies: 'dev'
      timeout-minutes: 30

  # Summary when benchmarks are skipped
  skip-summary:
    name: Performance Summary
    runs-on: ubuntu-latest
    needs: check-benchmarks
    if: needs.check-benchmarks.outputs.has-benchmarks == 'false'
    steps:
      - name: Report skipped
        run: |
          echo "## Performance Regression Testing" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⏭️ **Skipped**: No benchmark script found" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To enable performance regression testing:" >> $GITHUB_STEP_SUMMARY
          echo "1. Create \`scripts/benchmark.py\`" >> $GITHUB_STEP_SUMMARY
          echo "2. Script should output JSON metrics to stdout" >> $GITHUB_STEP_SUMMARY
          echo "3. Example metrics: \`{\"p95_ms\": 45.2, \"throughput_rps\": 1200}\`" >> $GITHUB_STEP_SUMMARY
