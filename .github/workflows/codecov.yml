# Codecov Coverage Upload for RAG Processor
# Uploads test coverage reports to Codecov after CI workflow completion.
#
# This is a thin caller to the org-level reusable workflow.
# Security: Downloads artifacts only, no source checkout.
#
# Documentation: https://docs.codecov.com/
name: Codecov Upload

on:
  # Trigger after CI workflow completes
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, master, develop]

permissions:
  contents: read
  actions: read

jobs:
  codecov:
    name: Upload Coverage
    # Only run on successful CI completion
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    uses: ByronWilliamsCPA/.github/.github/workflows/python-codecov.yml@62bfd795d1273b4819a3f66aa9cef0b917acb830 # main
    with:
      artifact-name: 'coverage-reports'
      coverage-files: '*.xml'
      name: 'RAG Processor Coverage'
      workflow-run-id: ${{ github.event.workflow_run.id }}
      commit-sha: ${{ github.event.workflow_run.head_sha }}
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  report-failure:
    name: Report CI Failure
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Report status
        run: |
          echo "## Coverage Upload Skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "CI workflow failed - coverage upload skipped" >> $GITHUB_STEP_SUMMARY
