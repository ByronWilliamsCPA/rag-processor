# Python Compatibility Matrix Testing for RAG Processor
# Tests the project across multiple Python versions and operating systems.
#
# This is a thin caller to the org-level reusable workflow.
#
# NOTE: macOS and Windows are currently disabled because python-magic requires
# the libmagic system library which isn't pre-installed on GitHub's runners.
# The org reusable workflow doesn't support pre-install hooks for system deps.
# TODO: Re-enable macOS/Windows when org workflow supports system dependency installation,
# or when we implement a local workflow with system dependency installation steps.
name: Python Compatibility

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**/*.py'
      - 'tests/**/*.py'
      - 'pyproject.toml'
      - 'uv.lock'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'src/**/*.py'
      - 'tests/**/*.py'
      - 'pyproject.toml'
      - 'uv.lock'
  schedule:
    # Weekly compatibility check on Sundays at 6 AM UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:

# Cancel in-progress runs for same PR/branch
concurrency:
  group: python-compat-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  compatibility:
    name: Python Compatibility Matrix
    uses: ByronWilliamsCPA/.github/.github/workflows/python-compatibility.yml@main
    with:
      python-versions: '["3.10", "3.11", "3.12", "3.13"]'
      operating-systems: '["ubuntu-latest"]'
      include-macos: false  # Disabled: python-magic requires libmagic (see note above)
      include-windows: false  # Disabled: python-magic requires libmagic DLL (see note above)
      source-directory: 'src'
      # NOTE: the org runner invokes `$TEST_COMMAND` unquoted, so any quoted
      # arg that contains spaces (e.g. -m "not slow and not integration") gets
      # word-split by bash and pytest exits 4 with "ERROR: '-m' marker
      # expression invalid". Keep this command space-free in quoted args.
      # `--ignore=tests/integration` already covers the integration exclusion;
      # the `slow` marker is not used anywhere in this repo.
      test-command: 'pytest tests/ -v --tb=short -x --ignore=tests/integration --ignore=tests/load'
      coverage-report: false
      fail-fast: false
      timeout-minutes: 30
      # rag-processor uses hatchling; --no-build would reject the editable install.
      no-build: false
    secrets: inherit
