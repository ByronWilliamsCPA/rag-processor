# {{ cookiecutter.project_name }} - Continuous Fuzzing
# ClusterFuzzLite workflow for automated security testing
#
# This workflow uses Google's ClusterFuzzLite to continuously fuzz test
# the codebase for vulnerabilities, crashes, and edge cases.
#
# Fuzzing Targets:
#   - Input validation functions
#   - Data parsers and sanitizers
#   - File format handlers
#
# Duration: 600 seconds per run
# Sanitizer: AddressSanitizer for memory safety
# Reporting: SARIF format uploaded to Security tab
name: Continuous Fuzzing

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  security-events: write  # For SARIF upload

jobs:
  fuzzing:
    name: ClusterFuzzLite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address]

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@91182cccc01eb5e619899d80e4e971d6181294a7 # v2.10.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build Fuzzers
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@f090cc7d581f82fb0e0b04f0c9e56ff7f4a24e76 # v1
        with:
          language: python
          sanitizer: ${{  matrix.sanitizer  }}

      - name: Run Fuzzers
        id: run
        uses: google/clusterfuzzlite/actions/run_fuzzers@f090cc7d581f82fb0e0b04f0c9e56ff7f4a24e76 # v1
        with:
          github-token: ${{  secrets.GITHUB_TOKEN  }}
          fuzz-seconds: 600
          mode: 'code-change'
          sanitizer: ${{  matrix.sanitizer  }}
          output-sarif: true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          sarif_file: results.sarif
          category: fuzzing-${{  matrix.sanitizer  }}

      - name: Upload Crash Artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzzing-crashes-${{  matrix.sanitizer  }}
          path: build/out/
          retention-days: 7

      - name: Fuzzing Summary
        if: always()
        run: |
          echo "## Fuzzing Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Sanitizer**: ${{  matrix.sanitizer  }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration**: 600 seconds" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Status**: ${{  steps.build.outcome  }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run Status**: ${{  steps.run.outcome  }}" >> $GITHUB_STEP_SUMMARY
