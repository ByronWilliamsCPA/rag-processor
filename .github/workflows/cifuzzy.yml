# RAG Processor - Continuous Fuzzing
# ClusterFuzzLite workflow for automated security testing using org-level reusable workflow.
#
# Fuzzing Targets:
#   - Input validation functions
#   - Data parsers and sanitizers
#   - File format handlers
#
# Documentation: https://google.github.io/clusterfuzzlite/
name: Continuous Fuzzing

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

# Cancel in-progress runs for same PR/branch
concurrency:
  group: fuzzing-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

# Uses org-level reusable workflow
jobs:
  fuzzing:
    name: ClusterFuzzLite
    uses: ByronWilliamsCPA/.github/.github/workflows/python-fuzzing.yml@main
    with:
      python-version: '3.12'
      fuzz-seconds: 600
      sanitizer: 'address'
      upload-sarif: true
      crash-retention-days: 7
      timeout-minutes: 30
      fail-on-crash: true
      dry-run: false
